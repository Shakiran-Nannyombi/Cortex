services:
  - type: web
    name: cortex-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 wsgi:app
    preDeployCommand: flask --app wsgi:app db upgrade
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: cortex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cortex-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: cortex-db
    engine: postgres
    version: 16
    plan: free

redis:
  - name: cortex-redis
    plan: free
